services:
  nginx:
    build:
      context: ..
      dockerfile: apps/app/Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api1
      - api2

  api1:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_DC: datacenter1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BASE_URL: http://localhost
    depends_on:
      - cassandra
      - redis
    restart: on-failure

  api2:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_DC: datacenter1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BASE_URL: http://localhost
    depends_on:
      - cassandra
      - redis
    restart: on-failure

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=url_shortener_cluster

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  cassandra_data:
  redis_data:
