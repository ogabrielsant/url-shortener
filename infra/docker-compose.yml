services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf"]
  cassandra:
    image: cassandra:4.1
    ports: ["9042:9042"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./apps/api
    environment:
      CASSANDRA_HOST: cassandra
      REDIS_URL: redis://redis:6379
  api-new-instance:
    build: ./apps/api
